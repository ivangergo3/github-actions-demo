name: Check Notion Availability (marketplace action)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * MON-FRI"

jobs:
  check:
    name: Check https://www.notion.com
    runs-on: ubuntu-latest
    steps:
      - name: Verify HTTPS connection and availability
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://www.notion.com/
          follow-redirect: true
          max-attempts: 3
          retry-delay: 5s
